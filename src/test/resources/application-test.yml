# Test Profile Configuration

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Disable Flyway for tests (Hibernate creates schema)
  flyway:
    enabled: false

  # Disable caching for tests
  cache:
    type: none

# AgentMesh Configuration
agentmesh:
  multitenancy:
    enabled: true
  security:
    # Tests run with auth disabled so existing @SpringBootTest integration
    # tests in api/* (AgentControllerIntegrationTest, BlackboardControllerIntegrationTest,
    # MASTControllerIntegrationTest) keep their permit-all behaviour without
    # needing per-method @WithMockUser. Production default flipped to true
    # in M13.3 commit 1 (R6 close); see SecurityConfig.java.
    auth-enforced: false
  llm:
    lora:
      enabled: true
      max-cached-adapters: 10
    openai:
      api-key: test-key-not-used
      model: gpt-4

# Logging
logging:
  level:
    root: WARN
    com.therighthandapp.agentmesh: INFO
    org.hibernate.SQL: DEBUG
