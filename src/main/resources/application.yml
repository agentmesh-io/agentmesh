server:
  port: 8080

spring:
  application:
    name: agentmesh

  main:
    allow-bean-definition-overriding: true

  # H2 Database configuration (dev/test) with HikariCP connection pooling
  datasource:
    url: jdbc:h2:mem:agentmesh;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
    # HikariCP Connection Pool Configuration (optimized for high concurrency)
    hikari:
      # Pool sizing - tuned for 100+ concurrent agents
      maximum-pool-size: 50  # Maximum connections (adjust based on DB server capacity)
      minimum-idle: 10       # Minimum idle connections for fast response
      
      # Connection management
      connection-timeout: 20000     # 20 seconds - wait time for connection from pool
      idle-timeout: 300000          # 5 minutes - max time connection can sit idle
      max-lifetime: 1800000         # 30 minutes - max lifetime of connection in pool

  # JPA/Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # Use create-drop for dev (Flyway disabled for H2 compatibility)
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Flyway Database Migration Configuration
  flyway:
    enabled: false                   # Disabled for H2 - enable for PostgreSQL production
    baseline-on-migrate: true        # Baseline existing databases
    baseline-version: 0              # Version to use for baseline
    locations: classpath:db/migration  # Migration scripts location
    table: flyway_schema_history     # Metadata table name
    validate-on-migrate: true        # Validate migrations before applying
    clean-disabled: true             # CRITICAL: Prevent accidental data loss
    out-of-order: false              # Disallow out-of-order migrations
    placeholder-replacement: true    # Enable placeholder substitution
    sql-migration-prefix: V          # Versioned migration prefix
    sql-migration-separator: __      # Separator between version and description
    sql-migration-suffixes: .sql     # Migration file extensions

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis Configuration (for production)
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Cache Configuration
  cache:
    type: ${SPRING_CACHE_TYPE:simple}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: agentmesh-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# AgentMesh specific configuration
agentmesh:
  # Auto-BADS Integration
  autobads:
    base-url: ${AUTOBADS_BASE_URL:http://localhost:8083}  # Use host.docker.internal:8083 in Docker
  
  # Weaviate vector DB for Long-Term Memory
  weaviate:
    enabled: false  # Set to true when Weaviate is available
    scheme: http
    host: localhost:8080

  # Temporal orchestration engine
  temporal:
    enabled: false  # Set to true when Temporal service is available
    service-address: 127.0.0.1:7233
    namespace: default
    task-queue: agentmesh-tasks

  # LLM Configuration
  llm:
    # Provider selection: "openai-compatible" | "ollama" | (empty = MockLLM)
    # "openai-compatible" works with LMStudio, Ollama /v1, OpenAI, Azure, Groq, etc.
    provider: ${LLM_PROVIDER:}  # Set to "openai-compatible" for real LLM

    # OpenAI-compatible settings (used when provider=openai-compatible)
    # LMStudio default: http://localhost:1234/v1
    # Ollama compat:    http://localhost:11434/v1
    # OpenAI:           https://api.openai.com/v1
    base-url: ${LLM_BASE_URL:http://localhost:1234/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:default}
    embedding-model: ${LLM_EMBEDDING_MODEL:text-embedding-nomic-embed-text-v1.5}
    temperature: ${LLM_TEMPERATURE:0.7}
    max-tokens: ${LLM_MAX_TOKENS:4096}
    timeout: ${LLM_TIMEOUT:120000}

    # Ollama native API (used when provider=ollama, legacy support)
    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:codellama:latest}
      embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    # OpenAI direct (legacy, prefer openai-compatible provider instead)
    openai:
      enabled: false
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4
      embedding-model: text-embedding-ada-002

    # LoRA Adapter Configuration (Phase 3)
    lora:
      enabled: false  # Set true to enable LoRA adapters
      max-cached-adapters: 10
      adapter-base-path: /var/agentmesh/lora-adapters
      # Supported serving backends: vllm, punica, slora
      serving-backend: vllm

  # Self-Correction Loop Configuration
  selfcorrection:
    max-iterations: 5  # Maximum correction attempts
    timeout-seconds: 300  # 5 minutes timeout per task

  # Security Configuration
  security:
    api-key-auth:
      enabled: ${API_KEY_AUTH_ENABLED:false}  # Enable for production
    api-key: ${AGENTMESH_API_KEY:}  # Set via env var for production

  # Multi-Tenancy Configuration
  multitenancy:
    enabled: false  # Set to true to enable multi-tenancy
    default-tier: STANDARD

    # Resource defaults by tier
    tiers:
      free:
        max-projects: 1
        max-agents: 5
        max-storage-mb: 1024
      standard:
        max-projects: 10
        max-agents: 50
        max-storage-mb: 10240
      premium:
        max-projects: 50
        max-agents: 200
        max-storage-mb: 51200
      enterprise:
        max-projects: 999
        max-agents: 999
        max-storage-mb: 1048576

    # Data sovereignty
    data-regions:
      - us-east-1
      - us-west-2
      - eu-west-1
      - ap-southeast-1

    # Kubernetes integration
    kubernetes:
      enabled: false  # Set true for K8s deployment
      namespace-prefix: agentmesh
      apply-network-policies: true
      apply-resource-quotas: true

  # Kubernetes Operator Configuration (Phase 3 Part 2)
  operator:
    enabled: false  # Set true to enable K8s operator
    reconcile-interval-seconds: 30
    worker-count: 2

  # VCS Provider Configuration
  vcs:
    provider: github  # github, gitlab, bitbucket, azure-devops

  # Project Management Provider Configuration
  projectmanagement:
    provider: github-projects  # github-projects, jira, azure-boards, linear

  # GitHub Integration Configuration
  github:
    enabled: false  # Set to true to enable GitHub integration
    token: ${GITHUB_TOKEN:}  # Set via environment variable
    repo-owner: ${GITHUB_REPO_OWNER:your-org}
    repo-name: ${GITHUB_REPO_NAME:your-repo}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

    # GitHub Projects (optional)
    projects:
      enabled: false  # Set to true to enable Projects integration
      project-id: ${GITHUB_PROJECT_ID:}  # GraphQL node ID (e.g., PVT_kwDOABC123)

  # Billing Configuration (Phase 3)
  billing:
    enabled: false  # Set true to enable billing tracking

    # Pricing model
    model: hybrid  # token, outcome, hybrid, subscription

    # Token pricing (per 1K tokens)
    token-pricing:
      input-cost: 0.01   # $0.01 per 1K input tokens
      output-cost: 0.03  # $0.03 per 1K output tokens

    # Outcome-based pricing
    outcome-pricing:
      success-fee: 2.00      # $2.00 per successful task
      failure-credit: -0.50  # $0.50 credit for failed tasks

    # Tier discounts
    tier-discounts:
      free: 1.0       # 100% discount (free)
      standard: 0.0   # No discount
      premium: 0.20   # 20% discount
      enterprise: 0.30  # 30% discount

# Actuator configuration for observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,beans,mappings

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus.metrics.export.enabled: true
