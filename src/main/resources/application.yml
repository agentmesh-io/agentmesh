server:
  port: 8080

spring:
  application:
    name: agentmesh

  main:
    allow-bean-definition-overriding: true

  # H2 Database configuration (dev/test)
  datasource:
    url: jdbc:h2:mem:agentmesh;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA/Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console

# AgentMesh specific configuration
agentmesh:
  # Weaviate vector DB for Long-Term Memory
  weaviate:
    enabled: false  # Set to true when Weaviate is available
    scheme: http
    host: localhost:8080

  # Temporal orchestration engine
  temporal:
    enabled: false  # Set to true when Temporal service is available
    service-address: 127.0.0.1:7233
    namespace: default
    task-queue: agentmesh-tasks

  # LLM Configuration
  llm:
    # OpenAI Configuration
    openai:
      enabled: false  # Set to true to use OpenAI instead of MockLLM
      api-key: ${OPENAI_API_KEY:}  # Set via environment variable
      model: gpt-4
      embedding-model: text-embedding-ada-002

    # LoRA Adapter Configuration (Phase 3)
    lora:
      enabled: false  # Set true to enable LoRA adapters
      max-cached-adapters: 10
      adapter-base-path: /var/agentmesh/lora-adapters
      # Supported serving backends: vllm, punica, slora
      serving-backend: vllm

  # Self-Correction Loop Configuration
  selfcorrection:
    max-iterations: 5  # Maximum correction attempts
    timeout-seconds: 300  # 5 minutes timeout per task

  # Multi-Tenancy Configuration
  multitenancy:
    enabled: false  # Set to true to enable multi-tenancy
    default-tier: STANDARD

    # Resource defaults by tier
    tiers:
      free:
        max-projects: 1
        max-agents: 5
        max-storage-mb: 1024
      standard:
        max-projects: 10
        max-agents: 50
        max-storage-mb: 10240
      premium:
        max-projects: 50
        max-agents: 200
        max-storage-mb: 51200
      enterprise:
        max-projects: 999
        max-agents: 999
        max-storage-mb: 1048576

    # Data sovereignty
    data-regions:
      - us-east-1
      - us-west-2
      - eu-west-1
      - ap-southeast-1

    # Kubernetes integration
    kubernetes:
      enabled: false  # Set true for K8s deployment
      namespace-prefix: agentmesh
      apply-network-policies: true
      apply-resource-quotas: true

  # Kubernetes Operator Configuration (Phase 3 Part 2)
  operator:
    enabled: false  # Set true to enable K8s operator
    reconcile-interval-seconds: 30
    worker-count: 2

  # VCS Provider Configuration
  vcs:
    provider: github  # github, gitlab, bitbucket, azure-devops

  # Project Management Provider Configuration
  projectmanagement:
    provider: github-projects  # github-projects, jira, azure-boards, linear

  # GitHub Integration Configuration
  github:
    enabled: false  # Set to true to enable GitHub integration
    token: ${GITHUB_TOKEN:}  # Set via environment variable
    repo-owner: ${GITHUB_REPO_OWNER:your-org}
    repo-name: ${GITHUB_REPO_NAME:your-repo}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

    # GitHub Projects (optional)
    projects:
      enabled: false  # Set to true to enable Projects integration
      project-id: ${GITHUB_PROJECT_ID:}  # GraphQL node ID (e.g., PVT_kwDOABC123)

  # Billing Configuration (Phase 3)
  billing:
    enabled: false  # Set true to enable billing tracking

    # Pricing model
    model: hybrid  # token, outcome, hybrid, subscription

    # Token pricing (per 1K tokens)
    token-pricing:
      input-cost: 0.01   # $0.01 per 1K input tokens
      output-cost: 0.03  # $0.03 per 1K output tokens

    # Outcome-based pricing
    outcome-pricing:
      success-fee: 2.00      # $2.00 per successful task
      failure-credit: -0.50  # $0.50 credit for failed tasks

    # Tier discounts
    tier-discounts:
      free: 1.0       # 100% discount (free)
      standard: 0.0   # No discount
      premium: 0.20   # 20% discount
      enterprise: 0.30  # 30% discount

# Actuator configuration for observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
