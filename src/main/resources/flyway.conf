# Flyway Configuration for AgentMesh
# Production database migration settings

# ============================================================================
# DATABASE CONNECTION
# ============================================================================
flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentmesh}
flyway.user=${DB_USER:postgres}
flyway.password=${DB_PASSWORD:postgres}
flyway.driver=org.postgresql.Driver

# ============================================================================
# MIGRATION SETTINGS
# ============================================================================
# Location of migration scripts
flyway.locations=classpath:db/migration

# Encoding of SQL migration files
flyway.encoding=UTF-8

# Schema to use for metadata table
flyway.schemas=public

# Table to track migrations
flyway.table=flyway_schema_history

# ============================================================================
# VALIDATION
# ============================================================================
# Validate migrations before applying
flyway.validate-on-migrate=true

# Allow out of order migrations (for hotfixes)
flyway.out-of-order=false

# Ignore missing migrations
flyway.ignore-missing-migrations=false

# Ignore ignored migrations
flyway.ignore-ignored-migrations=false

# Ignore pending migrations
flyway.ignore-pending-migrations=false

# Ignore future migrations
flyway.ignore-future-migrations=false

# ============================================================================
# BASELINE
# ============================================================================
# Baseline on migrate for existing databases
flyway.baseline-on-migrate=true
flyway.baseline-version=0
flyway.baseline-description=<< Flyway Baseline >>

# ============================================================================
# PLACEHOLDERS
# ============================================================================
# Enable placeholder replacement
flyway.placeholder-replacement=true
flyway.placeholder-prefix=${
flyway.placeholder-suffix=}

# Custom placeholders
flyway.placeholders.app_user=agentmesh
flyway.placeholders.default_tablespace=pg_default

# ============================================================================
# ADVANCED SETTINGS
# ============================================================================
# Clean database (DANGER: Only for dev)
flyway.clean-disabled=true
flyway.clean-on-validation-error=false

# Mixed migrations
flyway.mixed=false

# Group migrations
flyway.group=false

# Target version (empty = latest)
flyway.target=

# Repeatable migrations
flyway.repeatable-sql-migration-prefix=R

# Versioned migrations
flyway.sql-migration-prefix=V
flyway.sql-migration-separator=__
flyway.sql-migration-suffixes=.sql

# ============================================================================
# CALLBACKS
# ============================================================================
# Callback locations
flyway.callbacks=
flyway.skip-default-callbacks=false
flyway.skip-default-resolvers=false

# ============================================================================
# ORACLE SPECIFIC (N/A but kept for reference)
# ============================================================================
# flyway.oracle-sqlplus=false
# flyway.oracle-sqlplus-warn=false

# ============================================================================
# LOGGING
# ============================================================================
# Create schemas if they don't exist
flyway.create-schemas=true

# Enable batch mode
flyway.batch=false

# Stream results
flyway.stream=false

# Lock retry count
flyway.lock-retry-count=50
