services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agentmesh-postgres
    environment:
      POSTGRES_DB: agentmesh
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh123
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-temporal-db.sql:/docker-entrypoint-initdb.d/init-temporal-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Weaviate Vector Database
  weaviate:
    image: semitechnologies/weaviate:1.24.4
    container_name: agentmesh-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      ENABLE_MODULES: 'text2vec-transformers'
      TRANSFORMERS_INFERENCE_API: 'http://t2v-transformers:8080'
      CLUSTER_HOSTNAME: 'weaviate'
    ports:
      - "8081:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate
    depends_on:
      - t2v-transformers
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Transformers Inference Service for Weaviate
  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-multi-qa-MiniLM-L6-cos-v1
    container_name: agentmesh-transformers
    environment:
      ENABLE_CUDA: '0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: agentmesh-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=agentmesh
      - POSTGRES_PWD=agentmesh123
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "17233:7233"
      - "18082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "tctl --address localhost:7233 cluster health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 180s

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: agentmesh-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "12181:2181"
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: agentmesh-kafka
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: agentmesh-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # AgentMesh API Server
  agentmesh-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentmesh-api-server
    restart: unless-stopped
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agentmesh
      SPRING_DATASOURCE_USERNAME: agentmesh
      SPRING_DATASOURCE_PASSWORD: agentmesh123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_SHOW_SQL: false
      
      # HikariCP Connection Pool Configuration
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 600000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1800000
      
      # Flyway Configuration - ENABLED for database migrations
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'

      # Weaviate Configuration
      AGENTMESH_WEAVIATE_ENABLED: 'true'
      AGENTMESH_WEAVIATE_SCHEME: http
      AGENTMESH_WEAVIATE_HOST: weaviate:8080

      # Temporal Configuration - enabled but not blocking startup
      AGENTMESH_TEMPORAL_ENABLED: 'true'
      AGENTMESH_TEMPORAL_SERVICE_ADDRESS: temporal:7233

      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      # Redis Configuration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      SPRING_CACHE_REDIS_TIME_TO_LIVE: 3600000

      # Multi-tenancy
      AGENTMESH_MULTITENANCY_ENABLED: 'true'

      # Auto-BADS Integration
      AUTOBADS_BASE_URL: 'http://host.docker.internal:8083'

      # Billing
      AGENTMESH_BILLING_ENABLED: 'true'

      # Operator
      AGENTMESH_OPERATOR_ENABLED: 'false'

      # LLM Configuration
      AGENTMESH_LLM_OPENAI_ENABLED: 'false'
      AGENTMESH_LLM_LORA_ENABLED: 'false'

      # GitHub Integration
      AGENTMESH_GITHUB_ENABLED: 'false'

      # JVM Options
      JAVA_OPTS: '-Xmx512m -Xms256m'
    ports:
      - "${AGENTMESH_API_PORT:-18085}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: agentmesh-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: agentmesh-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentmesh123
      GF_INSTALL_PLUGINS: ''
      GF_SERVER_ROOT_URL: http://localhost:13000
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    ports:
      - "13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
      - ./grafana-provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # AgentMesh UI (Next.js Frontend)
  # Note: Auto-BADS service should be run standalone on port 8083
  agentmesh-ui:
    build:
      context: ../AgentMesh-UI/agentmesh-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AGENTMESH_API: http://localhost:18085
        NEXT_PUBLIC_AUTOBADS_API: http://localhost:8083
        NEXT_PUBLIC_WS_URL: ws://localhost:18085/ws
        NEXT_PUBLIC_ENV: production
    container_name: agentmesh-ui
    restart: unless-stopped
    environment:
      # Internal container hostname
      HOSTNAME: "0.0.0.0"
      PORT: "13001"
    ports:
      - "13001:13001"
    depends_on:
      agentmesh-api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:13001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  weaviate_data:
  temporal_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: agentmesh-network

