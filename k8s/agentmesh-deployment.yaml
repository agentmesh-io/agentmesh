---
apiVersion: v1
kind: Namespace
metadata:
  name: agentmesh
  labels:
    name: agentmesh
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentmesh-config
  namespace: agentmesh
data:
  SPRING_PROFILES_ACTIVE: "prod"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  SPRING_DATA_REDIS_HOST: "redis-service"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_CACHE_TYPE: "redis"
  SPRING_CACHE_REDIS_TIME_TO_LIVE: "3600000"
  
  # Database Configuration (PostgreSQL for production)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/agentmesh"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  
  # JPA Configuration
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  
  # HikariCP Configuration
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "50"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "10"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "20000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "300000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  
  # AgentMesh Configuration
  AGENTMESH_WEAVIATE_ENABLED: "false"
  AGENTMESH_TEMPORAL_ENABLED: "false"
  AGENTMESH_LLM_OPENAI_ENABLED: "false"
  AGENTMESH_MULTITENANCY_ENABLED: "true"
  AGENTMESH_MULTITENANCY_DEFAULT_TIER: "STANDARD"
  
  # Actuator Configuration
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentmesh-secrets
  namespace: agentmesh
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "agentmesh"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"  # Use sealed-secrets in prod
  GITHUB_TOKEN: ""
  OPENAI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentmesh
  namespace: agentmesh
  labels:
    app: agentmesh
    version: v1
spec:
  replicas: 3  # Start with 3 replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments
  selector:
    matchLabels:
      app: agentmesh
  template:
    metadata:
      labels:
        app: agentmesh
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init Container - Wait for dependencies
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']
      - name: wait-for-kafka
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z kafka-service 9092; do echo waiting for kafka; sleep 2; done;']
      
      containers:
      - name: agentmesh
        image: agentmesh:1.0-SNAPSHOT  # Update with your registry
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        # Environment Variables from ConfigMap
        envFrom:
        - configMapRef:
            name: agentmesh-config
        - secretRef:
            name: agentmesh-secrets
        
        # Resource Limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Startup Probe - For slow startup scenarios
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30  # 5 minutes max startup time
        
        # Volume Mounts
        volumeMounts:
        - name: logs
          mountPath: /var/log/agentmesh
      
      volumes:
      - name: logs
        emptyDir: {}
      
      # Affinity - Spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - agentmesh
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-service
  namespace: agentmesh
  labels:
    app: agentmesh
spec:
  type: ClusterIP
  selector:
    app: agentmesh
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: ClientIP  # For stateful operations
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
apiVersion: v1
kind: Service
metadata:
  name: agentmesh-headless
  namespace: agentmesh
  labels:
    app: agentmesh
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet-like discovery
  selector:
    app: agentmesh
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agentmesh-pdb
  namespace: agentmesh
spec:
  minAvailable: 2  # Always keep at least 2 pods running
  selector:
    matchLabels:
      app: agentmesh
