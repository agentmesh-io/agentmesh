---
# Production Ingress with TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentmesh-ingress-prod
  namespace: agentmesh-prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - agentmesh.example.com
    - api.agentmesh.example.com
    secretName: agentmesh-tls-prod
  rules:
  - host: agentmesh.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agentmesh-service
            port:
              number: 8080
  - host: api.agentmesh.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agentmesh-service
            port:
              number: 8080
