apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.agentmesh.io
spec:
  group: agentmesh.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - organizationId
                - tier
              properties:
                organizationId:
                  type: string
                  description: "Unique organization identifier"
                name:
                  type: string
                  description: "Tenant display name"
                tier:
                  type: string
                  enum: ["FREE", "STANDARD", "PREMIUM", "ENTERPRISE"]
                  description: "Tenant tier for resource allocation"
                dataRegion:
                  type: string
                  description: "Data residency region (e.g., us-east-1)"
                requiresDataLocality:
                  type: boolean
                  description: "Enforce data locality requirements"
                  default: false
                maxProjects:
                  type: integer
                  description: "Maximum projects allowed"
                maxAgents:
                  type: integer
                  description: "Maximum agents allowed"
                maxStorageMb:
                  type: integer
                  format: int64
                  description: "Maximum storage in MB"
                resourceQuota:
                  type: object
                  description: "Kubernetes resource quotas"
                  properties:
                    cpuRequest:
                      type: string
                      description: "CPU request (e.g., '10')"
                    cpuLimit:
                      type: string
                      description: "CPU limit (e.g., '20')"
                    memoryRequest:
                      type: string
                      description: "Memory request (e.g., '20Gi')"
                    memoryLimit:
                      type: string
                      description: "Memory limit (e.g., '40Gi')"
                    gpuRequest:
                      type: string
                      description: "GPU request (e.g., '2')"
                    pods:
                      type: string
                      description: "Max pod count (e.g., '50')"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Creating", "Active", "Suspended", "Deleting", "Failed"]
                  description: "Current tenant phase"
                namespace:
                  type: string
                  description: "Kubernetes namespace created for tenant"
                message:
                  type: string
                  description: "Status message"
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
  scope: Cluster
  names:
    plural: tenants
    singular: tenant
    kind: Tenant
    shortNames:
      - tnt

